<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1024">
  <title>Home</title>
  <link rel="stylesheet" href="receiver.css">
</head>
<body>

  <div id="bg-current" class="bg-layer"></div>
  <div id="bg-next" class="bg-layer"></div>

  <div id="overlay">

    <div id="center">
      <div id="time"></div>
      <div id="date"></div>
      <div id="weather">
        <span id="weather-icon"></span>
        <span id="weather-temp"></span>
        <span id="weather-label"></span>
        <div id="weather-hilo"></div>
      </div>
    </div>

    <div id="plane-card">
      <div id="plane-header">✈ OVERHEAD</div>
      <div id="plane-callsign"></div>
      <div id="plane-airline"></div>
      <div id="plane-aircraft"></div>
      <div id="plane-route"></div>
      <div id="plane-stats"></div>
    </div>

  </div>

  <script src="receiver.js"></script>
</body>
</html>
